name: Flutter Project Auto Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Repair and Force Project Structure
      run: |
        # আমাদের দেওয়া ফাইলগুলো সাময়িক ব্যাকআপ রাখা
        mkdir -p temp_source
        cp pubspec.yaml temp_source/ 2>/dev/null || true
        cp lib/main.dart temp_source/ 2>/dev/null || true
        
        # গিটহাব রানারের ডিরেক্টরি সম্পূর্ণ ফ্রেশ করা
        rm -rf * .github
        
        # একটি সম্পূর্ণ অফিশিয়াল ফ্ল্যাটার প্রোজেক্ট তৈরি করা
        flutter create --org com.rafi.tokensolution --project-name prepaid_meter_token_solution .
        
        # ব্যাকআপ থেকে আমাদের মেইন সোর্স কোডগুলো প্রোজেক্টে পুশ করা
        cp temp_source/pubspec.yaml .
        cp temp_source/main.dart lib/main.dart
        
        # অ্যান্ড্রয়েডের জন্য মিনিমাম SDK সংস্করণ ২১ এ উন্নীত করা (ক্যামেরা প্লাগইনের জন্য জরুরি)
        sed -i 's/minSdkVersion .*/minSdkVersion 21/' android/app/build.gradle

    - name: Get Flutter Packages
      run: flutter pub get

    - name: Build Release APK
      run: flutter build apk --release

    - name: Upload Artifact APK
      uses: actions/upload-artifact@v4
      with:
        name: Token-Scanner-APK
        path: build/app/outputs/flutter-apk/app-release.apk
