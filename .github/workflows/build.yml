name: Flutter Project Auto Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Clean & Reconstruct Perfect Flutter Project
      run: |
        # আমাদের দেওয়া মেইন ফাইলগুলো ব্যাকআপ রাখা
        mkdir -p temp_source
        cp pubspec.yaml temp_source/ 2>/dev/null || true
        cp lib/main.dart temp_source/ 2>/dev/null || true
        
        # গিটহাব রানারের ডিরেক্টরি সম্পূর্ণ ফাঁকা করা
        rm -rf * .github
        
        # লেটেস্ট অফিশিয়াল ফ্ল্যাটার প্রোজেক্ট স্ক্র্যাচ থেকে তৈরি করা
        flutter create --org com.rafi.tokensolution --project-name prepaid_meter_token_solution .
        
        # ব্যাকআপ থেকে আমাদের মেইন সোর্স কোডগুলো রিপ্লেস করা
        cp temp_source/pubspec.yaml .
        rm -rf lib
        mkdir -p lib
        cp temp_source/main.dart lib/main.dart
        
        # ক্যামেরা ও টেক্সট রিকগনিশন প্লাগইনের জন্য মিনিমাম SDK সংস্করণ বাড়িয়ে ২১ করা
        sed -i 's/minSdkVersion .*/minSdkVersion 21/' android/app/build.gradle

    - name: Get Packages
      run: flutter pub get

    - name: Build Release APK
      run: flutter build apk --release --no-pub

    - name: Upload Artifact APK
      uses: actions/upload-artifact@v4
      with:
        name: Token-Scanner-APK
        path: build/app/outputs/flutter-apk/app-release.apk
